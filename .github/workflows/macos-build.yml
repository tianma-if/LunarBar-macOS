name: macOS Build

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build LunarBar
    runs-on: macos-latest
    env:
      DEVELOPMENT_TEAM: 9KA3NM38B6
      DEVELOPER_ID_APPLICATION: "Developer ID Application: Zhengzhou Binggui Network Technology Co., Ltd. (9KA3NM38B6)"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Prepare build metadata
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "BUILD_CONFIGURATION=Release" >> "$GITHUB_ENV"
            echo "SHOULD_SIGN=true" >> "$GITHUB_ENV"
            echo "DMG_NAME=LunarBar-${GITHUB_REF_NAME}-macOS.dmg" >> "$GITHUB_ENV"
            echo "ARTIFACT_NAME=LunarBar-${GITHUB_REF_NAME}-macOS" >> "$GITHUB_ENV"
          elif [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "BUILD_CONFIGURATION=Release" >> "$GITHUB_ENV"
            echo "SHOULD_SIGN=true" >> "$GITHUB_ENV"
            echo "DMG_NAME=LunarBar-actions-signed-macOS.dmg" >> "$GITHUB_ENV"
            echo "ARTIFACT_NAME=LunarBar-actions-signed-${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"
          else
            echo "BUILD_CONFIGURATION=Debug" >> "$GITHUB_ENV"
            echo "SHOULD_SIGN=false" >> "$GITHUB_ENV"
            echo "DMG_NAME=LunarBar-debug-macOS.dmg" >> "$GITHUB_ENV"
            echo "ARTIFACT_NAME=LunarBar-debug-macOS" >> "$GITHUB_ENV"
          fi

      - name: Install Developer ID certificate
        if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id-application.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          test -n "$BUILD_CERTIFICATE_BASE64"
          test -n "$P12_PASSWORD"
          test -n "$KEYCHAIN_PASSWORD"

          echo "$BUILD_CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" \
            -P "$P12_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Build app
        run: |
          SIGNING_ARGS=("CODE_SIGNING_ALLOWED=NO")
          if [[ "$SHOULD_SIGN" == "true" ]]; then
            SIGNING_ARGS=(
              "CODE_SIGNING_ALLOWED=YES"
              "CODE_SIGN_STYLE=Manual"
              "DEVELOPMENT_TEAM=${DEVELOPMENT_TEAM}"
              "CODE_SIGN_IDENTITY=${DEVELOPER_ID_APPLICATION}"
              "CODE_SIGN_INJECT_BASE_ENTITLEMENTS=NO"
              "OTHER_CODE_SIGN_FLAGS=--timestamp"
            )
          fi

          xcodebuild \
            -project LunarBar.xcodeproj \
            -scheme LunarBar \
            -configuration "${BUILD_CONFIGURATION}" \
            -destination 'platform=macOS' \
            -derivedDataPath build/DerivedData \
            "${SIGNING_ARGS[@]}" \
            build

      - name: Verify app signature
        if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
        run: |
          APP_PATH="build/DerivedData/Build/Products/${BUILD_CONFIGURATION}/LunarBar.app"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          codesign --display --verbose=4 "$APP_PATH"

          SIGNING_INFO="$(codesign --display --verbose=4 "$APP_PATH" 2>&1)"
          echo "$SIGNING_INFO"
          grep -q '^Timestamp=' <<< "$SIGNING_INFO"

          ENTITLEMENTS="$(codesign --display --entitlements :- "$APP_PATH" 2>/dev/null || true)"
          echo "$ENTITLEMENTS"
          if grep -q 'com.apple.security.get-task-allow' <<< "$ENTITLEMENTS"; then
            echo "Release signature contains the forbidden get-task-allow entitlement."
            exit 1
          fi

      - name: Package app
        run: |
          APP_PATH="build/DerivedData/Build/Products/${BUILD_CONFIGURATION}/LunarBar.app"
          test -d "$APP_PATH"
          DMG_ROOT="build/dmg-root"
          rm -rf "$DMG_ROOT"
          mkdir -p "$DMG_ROOT"
          cp -R "$APP_PATH" "$DMG_ROOT/"
          ln -s /Applications "$DMG_ROOT/Applications"
          hdiutil create \
            -volname "LunarBar" \
            -srcfolder "$DMG_ROOT" \
            -ov \
            -format UDZO \
            "${DMG_NAME}"

      - name: Sign disk image
        if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
        run: |
          codesign \
            --force \
            --timestamp \
            --sign "$DEVELOPER_ID_APPLICATION" \
            "$DMG_NAME"
          codesign --verify --strict --verbose=2 "$DMG_NAME"

      - name: Notarize and staple disk image
        if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
        env:
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          test -n "$APP_STORE_CONNECT_API_KEY_BASE64"
          test -n "$APP_STORE_CONNECT_API_KEY_ID"
          test -n "$APP_STORE_CONNECT_ISSUER_ID"

          API_KEY_PATH="$RUNNER_TEMP/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"
          echo "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 --decode > "$API_KEY_PATH"
          chmod 600 "$API_KEY_PATH"

          NOTARY_RESULT="$(xcrun notarytool submit "$DMG_NAME" \
            --key "$API_KEY_PATH" \
            --key-id "$APP_STORE_CONNECT_API_KEY_ID" \
            --issuer "$APP_STORE_CONNECT_ISSUER_ID" \
            --wait \
            --output-format json)"
          echo "$NOTARY_RESULT"

          NOTARY_SUBMISSION_ID="$(plutil -extract id raw - <<< "$NOTARY_RESULT")"
          NOTARY_STATUS="$(plutil -extract status raw - <<< "$NOTARY_RESULT")"
          if [[ "$NOTARY_STATUS" != "Accepted" ]]; then
            xcrun notarytool log "$NOTARY_SUBMISSION_ID" \
              --key "$API_KEY_PATH" \
              --key-id "$APP_STORE_CONNECT_API_KEY_ID" \
              --issuer "$APP_STORE_CONNECT_ISSUER_ID" \
              "$RUNNER_TEMP/notary-log.json" || true
            cat "$RUNNER_TEMP/notary-log.json" || true
            exit 1
          fi

          xcrun stapler staple "$DMG_NAME"
          xcrun stapler validate "$DMG_NAME"
          spctl \
            --assess \
            --type open \
            --context context:primary-signature \
            --verbose=2 \
            "$DMG_NAME"

      - name: Upload app artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.DMG_NAME }}
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            "${DMG_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "LunarBar ${GITHUB_REF_NAME}" \
            --notes "Developer ID signed release generated by GitHub Actions."

      - name: Remove temporary keychain
        if: always() && (github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v'))
        run: security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" || true
