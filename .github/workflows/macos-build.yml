name: macOS Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build LunarBar
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build app
        run: |
          xcodebuild \
            -project LunarBar.xcodeproj \
            -scheme LunarBar \
            -configuration Debug \
            -destination 'platform=macOS' \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package app
        run: |
          APP_PATH="build/DerivedData/Build/Products/Debug/LunarBar.app"
          test -d "$APP_PATH"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" LunarBar-debug.zip

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: LunarBar-debug
          path: LunarBar-debug.zip
          if-no-files-found: error
