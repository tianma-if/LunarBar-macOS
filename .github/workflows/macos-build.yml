name: macOS Build

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build LunarBar
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Prepare build metadata
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "BUILD_CONFIGURATION=Release" >> "$GITHUB_ENV"
            echo "DMG_NAME=LunarBar-${GITHUB_REF_NAME}-macOS.dmg" >> "$GITHUB_ENV"
            echo "ARTIFACT_NAME=LunarBar-${GITHUB_REF_NAME}-macOS" >> "$GITHUB_ENV"
          else
            echo "BUILD_CONFIGURATION=Debug" >> "$GITHUB_ENV"
            echo "DMG_NAME=LunarBar-debug-macOS.dmg" >> "$GITHUB_ENV"
            echo "ARTIFACT_NAME=LunarBar-debug-macOS" >> "$GITHUB_ENV"
          fi

      - name: Build app
        run: |
          xcodebuild \
            -project LunarBar.xcodeproj \
            -scheme LunarBar \
            -configuration "${BUILD_CONFIGURATION}" \
            -destination 'platform=macOS' \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package app
        run: |
          APP_PATH="build/DerivedData/Build/Products/${BUILD_CONFIGURATION}/LunarBar.app"
          test -d "$APP_PATH"
          DMG_ROOT="build/dmg-root"
          rm -rf "$DMG_ROOT"
          mkdir -p "$DMG_ROOT"
          cp -R "$APP_PATH" "$DMG_ROOT/"
          ln -s /Applications "$DMG_ROOT/Applications"
          hdiutil create \
            -volname "LunarBar" \
            -srcfolder "$DMG_ROOT" \
            -ov \
            -format UDZO \
            "${DMG_NAME}"

      - name: Upload app artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.DMG_NAME }}
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            "${DMG_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "LunarBar ${GITHUB_REF_NAME}" \
            --notes "Release build generated by GitHub Actions."
