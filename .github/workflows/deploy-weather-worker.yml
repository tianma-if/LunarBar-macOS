name: Deploy Weather Worker

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Weather Worker
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: workers/weather

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Wrangler
        run: npm install --no-save wrangler@4.105.0

      - name: Deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler deploy
